name: Update GitHub Stats

on:
  schedule:
    # 매일 자정에 통계 업데이트 (시간은 UTC 기준)
    - cron: "0 0 * * *"
  workflow_dispatch: # Actions 탭에서 수동으로 즉시 실행할 수 있게 해주는 옵션

jobs:
  generate-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 액션 봇이 레포지토리에 파일을 푸시할 수 있도록 쓰기 권한 부여

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Stats Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: "username=OpMAY&show_icons=true&theme=radical"
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Top Languages Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: "username=OpMAY&layout=compact&theme=radical"
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add profile/stats.svg profile/top-langs.svg
          git commit -m "chore: update github stats" || echo "No changes to commit"
          git push
